{% extends 'aquaguard/base.html' %}

{% block title %}Add Technician - AquaGuard{% endblock %}

{% block content %}
<style>
    .form-container {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%);
        color: white;
        padding: 40px 30px;
        min-height: 100vh;
        
    }

    .form-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(14, 165, 233, 0.2);
        border-radius: 12px;
        padding: 30px;
        max-width: 600px;
        margin: 0 auto;
    }

    .form-card h1 {
        font-size: 24px;
        margin-bottom: 30px;
        color: white;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #0ea5e9;
        font-size: 12px;
        text-transform: uppercase;
        font-weight: 600;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 10px 12px;
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid rgba(14, 165, 233, 0.2);
        border-radius: 6px;
        color: white;
        font-size: 14px;
        font-family: inherit;
        box-sizing: border-box;
        transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        outline: none;
        background: rgba(30, 41, 59, 0.8);
        border-color: #0ea5e9;
        box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 80px;
    }

    .form-group input::placeholder,
    .form-group select::placeholder,
    .form-group textarea::placeholder {
        color: #64748b;
    }

    .form-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid rgba(14, 165, 233, 0.2);
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.3s;
        text-decoration: none;
    }

    .btn-primary {
        background: linear-gradient(135deg, #0ea5e9, #06b6d4);
        color: white;
    }

    .btn-primary:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
    }

    .btn-secondary {
        background: rgba(30, 41, 59, 0.5);
        color: white;
        border: 1px solid rgba(14, 165, 233, 0.2);
    }

    .btn-secondary:hover {
        background: rgba(30, 41, 59, 0.8);
    }

    .required {
        color: #ef4444;
    }

    .info-box {
        background: rgba(14, 165, 233, 0.1);
        border: 1px solid rgba(14, 165, 233, 0.2);
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 12px;
        color: #0ea5e9;
    }

    .back-link {
        color: #0ea5e9;
        text-decoration: none;
        font-size: 14px;
        margin-bottom: 20px;
        display: inline-block;
    }

    .back-link:hover {
        text-decoration: underline;
    }
</style>

<div class="form-container">
    <div class="form-card">
        <a href="{% url 'aquaguard:technician-list' %}" class="back-link">← Back to Technicians</a>
        
        <h1>👨‍🔧 Add New Technician</h1>

        <div class="info-box">
            ℹ️ Fill in all required fields to add a new technician to the system.
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Name <span class="required">*</span></label>
                <input type="text" name="name" placeholder="Technician full name" required>
            </div>

            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" name="email" placeholder="Email address" required>
            </div>

            <div class="form-group">
                <label>Phone Number <span class="required">*</span></label>
                <input type="tel" name="phone_number" placeholder="Contact number" required>
            </div>

            <div class="form-group">
                <label>Specialization</label>
                <input type="text" name="specialization" placeholder="e.g., Plumbing, Electronics, Filtration">
            </div>

            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="available">Available</option>
                    <option value="busy">Busy</option>
                    <option value="on_leave">On Leave</option>
                </select>
            </div>

            <div class="form-group">
                <label>Area of Operation</label>
                <input type="text" name="area_of_operation" placeholder="Service area/region">
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="address" placeholder="Office/service address"></textarea>
            </div>

            <div class="form-actions">
                <a href="{% url 'aquaguard:technician-list' %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Add Technician</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
