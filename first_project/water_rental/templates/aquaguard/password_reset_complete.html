{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - AquaGuard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .complete-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: #10b981;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        p {
            color: #64748b;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .success-box {
            background: #d1fae5;
            border: 1px solid #6ee7b7;
            border-radius: 10px;
            padding: 20px;
            margin: 30px 0;
            font-size: 14px;
            color: #065f46;
            line-height: 1.6;
        }

        .btn-login {
            display: inline-block;
            padding: 14px 30px;
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body>
    <div class="complete-container">
        <div class="icon">✅</div>
        <h1>Password Reset Successful!</h1>
        <p>Your password has been successfully reset.</p>
        
        <div class="success-box">
            🎉 <strong>You're all set!</strong><br>
            Your new password is now active. You can use it to log in to your admin account.
        </div>

        <a href="{% url 'aquaguard:admin-login' %}" class="btn-login">Login Now</a>
    </div>
</body>
</html>
