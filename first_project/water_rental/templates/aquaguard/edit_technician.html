{% extends 'aquaguard/base.html' %}

{% block title %}Edit {{ technician.name }} - AquaGuard{% endblock %}

{% block content %}
<style>
    .form-container {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%);
        color: white;
        padding: 40px 30px;
        min-height: 100vh;
       
    }

    .form-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(14, 165, 233, 0.2);
        border-radius: 12px;
        padding: 30px;
        max-width: 600px;
        margin: 0 auto;
    }

    .form-card h1 {
        font-size: 24px;
        margin-bottom: 30px;
        color: white;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #0ea5e9;
        font-size: 12px;
        text-transform: uppercase;
        font-weight: 600;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 10px 12px;
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid rgba(14, 165, 233, 0.2);
        border-radius: 6px;
        color: white;
        font-size: 14px;
        font-family: inherit;
        box-sizing: border-box;
        transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        outline: none;
        background: rgba(30, 41, 59, 0.8);
        border-color: #0ea5e9;
        box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 80px;
    }

    .form-group input::placeholder,
    .form-group select::placeholder,
    .form-group textarea::placeholder {
        color: #64748b;
    }

    .form-group.read-only input {
        background: rgba(15, 23, 42, 0.5);
        color: #94a3b8;
        cursor: not-allowed;
    }

    .read-only-badge {
        background: rgba(239, 68, 68, 0.1);
        color: #fca5a5;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
        margin-left: 8px;
        text-transform: uppercase;
        font-weight: 600;
    }

    .form-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid rgba(14, 165, 233, 0.2);
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.3s;
        text-decoration: none;
    }

    .btn-primary {
        background: linear-gradient(135deg, #0ea5e9, #06b6d4);
        color: white;
    }

    .btn-primary:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
    }

    .btn-secondary {
        background: rgba(30, 41, 59, 0.5);
        color: white;
        border: 1px solid rgba(14, 165, 233, 0.2);
    }

    .btn-secondary:hover {
        background: rgba(30, 41, 59, 0.8);
    }

    .info-box {
        background: rgba(14, 165, 233, 0.1);
        border: 1px solid rgba(14, 165, 233, 0.2);
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 12px;
        color: #0ea5e9;
    }

    .back-link {
        color: #0ea5e9;
        text-decoration: none;
        font-size: 14px;
        margin-bottom: 20px;
        display: inline-block;
    }

    .back-link:hover {
        text-decoration: underline;
    }
</style>

<div class="form-container">
    <div class="form-card">
        <a href="{% url 'aquaguard:technician-detail' technician.id %}" class="back-link">← Back to Technician</a>
        
        <h1>✏️ Edit Technician</h1>

        <div class="info-box">
            ℹ️ Email address cannot be changed. Update other details as needed.
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group read-only">
                <label>Email <span class="read-only-badge">Read-only</span></label>
                <input type="email" value="{{ technician.email }}" disabled readonly>
            </div>

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" value="{{ technician.name }}" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone_number" value="{{ technician.phone_number }}" required>
            </div>

            <div class="form-group">
                <label>Specialization</label>
                <input type="text" name="specialization" value="{{ technician.specialization|default:"" }}" placeholder="e.g., Plumbing, Electronics, Filtration">
            </div>

            <div class="form-group">
                <label>Status</label>
                <select name="status" required>
                    {% for value, label in status_choices %}
                    <option value="{{ value }}" {% if technician.status == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Area of Operation</label>
                <input type="text" name="area_of_operation" value="{{ technician.area_of_operation|default:"" }}" placeholder="Service area/region">
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="address" placeholder="Office/service address">{{ technician.address|default:"" }}</textarea>
            </div>

            <div class="form-actions">
                <a href="{% url 'aquaguard:technician-detail' technician.id %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
