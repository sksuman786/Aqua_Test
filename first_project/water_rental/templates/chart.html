<!DOCTYPE html>
<html>
<head>
    <title>Device Traffic Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Inter, Arial;
            background: #eef2ff;
            padding: 40px;
            margin: 0;
        }
        .card {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 15px;
        }
        canvas {
            height: 450px !important;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Daily Visitors by Device Type</h2>
    <canvas id="trafficChart"></canvas>
</div>




<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script>
    const dates = {{ dates|safe }};
    const browser = {{ browser|safe }};
    const android = {{ android|safe }};
    const esp = {{ esp|safe }};
    const ios = {{ ios|safe }};
    const total = {{ total|safe }};

    const ctx = document.getElementById("trafficChart").getContext("2d");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: dates,
            datasets: [
                {
                    label: "Browser",
                    data: browser,
                    borderColor: "#2563eb",
                    backgroundColor: "#2563eb",
                    borderWidth: 3,
                    pointRadius: 6,
                    pointBackgroundColor: "#2563eb",
                    tension: 0.3,
                },
                {
                    label: "Android",
                    data: android,
                    borderColor: "#16a34a",
                    backgroundColor: "#16a34a",
                    borderWidth: 3,
                    pointRadius: 6,
                    pointBackgroundColor: "#16a34a",
                    tension: 0.3,
                },
                {
                    label: "ESP32",
                    data: esp,
                    borderColor: "#f59e0b",
                    backgroundColor: "#f59e0b",
                    borderWidth: 3,
                    pointRadius: 6,
                    pointBackgroundColor: "#f59e0b",
                    tension: 0.3,
                },
                {
                    label: "iOS",
                    data: ios,
                    borderColor: "#7c3aed",
                    backgroundColor: "#7c3aed",
                    borderWidth: 3,
                    pointRadius: 6,
                    pointBackgroundColor: "#7c3aed",
                    tension: 0.3,
                },
                {
                    label: "Total Visitors",
                    data: total,
                    borderColor: "#111827",
                    backgroundColor: "#111827",
                    borderWidth: 4,
                    borderDash: [6, 6],
                    pointRadius: 8,
                    pointBackgroundColor: "#111827",
                    tension: 0.3,
                }
            ]
        },

        options: {
            responsive: true,
            plugins: {
                legend: { position: "bottom" },

                // ⭐ SHOW NUMBER LABELS ON EVERY POINT
                datalabels: {
                    color: "#000",
                    anchor: "end",
                    align: "top",
                    font: { size: 12, weight: "bold" },
                    formatter: (value) => value > 0 ? value : "",
                },

                // ⭐ TOOLTIP FOR BETTER UNDERSTANDING
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return `${context.dataset.label}: ${context.formattedValue}`;
                        }
                    }
                }
            },

            scales: {
                x: { ticks: { maxRotation: 45, minRotation: 45 } },
                y: { beginAtZero: true }
            }
        },

        plugins: [ChartDataLabels]
    });
</script>


</body>
</html>
